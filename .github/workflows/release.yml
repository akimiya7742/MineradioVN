name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: true
        default: '1.1.2'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install
      - name: Get Changelog
        id: get_changelog
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          VERSION=${VERSION#v}
          CONTENT=$(sed -n "/^## v$VERSION/,/^## v/p" CHANGELOG.md | sed '$d')
          {
            echo 'changelog<<EOF'
            echo "$CONTENT"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      # Build cho Windows và Linux
      - name: Build Electron App
        uses: samuelmeuli/action-electron-builder@v1
        with:
          # Cần thiết lập GH_TOKEN trong Settings > Secrets
          github_token: ${{ secrets.GITHUB_TOKEN }}
          build_script_name: build # Tự động chạy npm run build (cần config trong package.json)
          args: --win --linux

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
