name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (tags)'
        required: true
        default: '1.1.2'

jobs:
  build:
    strategy:
      matrix:
        # Chạy song song trên cả 2 hệ điều hành
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Python
        if: matrix.os == 'windows-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Castlabs EVS client
        if: matrix.os == 'windows-latest'
        run: |
          python -m pip install --upgrade castlabs-evs

      - name: Install dependencies
        run: npm install
  
      - name: Install playwright dependencies
        if: matrix.os == 'ubuntu-latest'
        run: npx playwright install-deps chromium

      - name: Setup browser resources and install
        run: |
          cmake -E make_directory resources/browsers
          npm run playwright:install

      # Build tùy theo hệ điều hành (Tránh xung đột lệnh)
      - name: Build Electron App (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run build:linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Electron App (Windows Unpacked)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win dir
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Sign VMP for Windows Package
        if: matrix.os == 'windows-latest'
        run: |
          python -m castlabs_evs.vmp sign-pkg dist/win-unpacked
        env:
          EVS_ACCOUNT_NAME: ${{ secrets.EVS_ACCOUNT_NAME }}
          EVS_PASSWD: ${{ secrets.EVS_PASSWD }}
          EVS_NO_ASK: "true"
      - name: Package Windows Installer (NSIS)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win nsis --prepackaged dist/win-unpacked
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          # Thêm if-no-files-found để tránh bị lỗi nếu build thiếu file
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-downloads

      - name: Get Changelog
        id: get_changelog
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          VERSION=${VERSION#v}
          CONTENT=$(sed -n "/^## v$VERSION/,/^## v/p" CHANGELOG.md | sed '$d')
          {
            echo 'changelog<<EOF'
            echo "$CONTENT"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: ${{ steps.get_changelog.outputs.changelog }}
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: dist-downloads/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
